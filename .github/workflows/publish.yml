name: Build & Release Package (Windows EspeakNg)

# =============================================================================
# 安全須知（公開 repo 推 GitHub Packages 私有套件）：給後來維護者
#
# 本流程用內建 `GITHUB_TOKEN`（搭配 permissions.packages: write）把套件推到
# 本 repo 連結的 GitHub Packages，不依賴任何 org secret。套件的私有/公開由套件
# 自身的 visibility 決定，與 repo 是否公開、與用哪把 token 推皆無關。
# 以下規則維持發布權不外洩，請勿破壞：
#
# 1. 觸發只限 `push: tags`（release tag）與 `workflow_dispatch`，**不要加 `pull_request`**。
#    → 只有能打 release tag 的維護者能發布。
# 2. fork 來的 PR 對 `GITHUB_TOKEN` 只有唯讀權限 —— 這是 GitHub 內建保護，無法用來發布。
# 3. **絕對不要用 `pull_request_target` 去 checkout/執行不信任的 PR 程式碼**。
# 4. 能發布的只有「有 write 權限的協作者」。
#    → write / 打 tag 權限只給組織內信任成員；建議對 outside collaborators 開啟
#      「Require approval to run workflows」。
# =============================================================================

on:
  workflow_dispatch:
  push:
    tags:
      - 'release*'
      - '*release*'


permissions:
  packages: write
  contents: read

jobs:
  build:
    # GitHub-hosted Windows runner：開源後不依賴 self-hosted，且映像含 MSVC 可跑 Native AOT。
    runs-on: windows-latest

    env:
      VERSION: ''

    steps:

      - name: 從 tag 取出版號（三碼或四碼，空版號會跳過後續發布步驟）
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}"
          $tagName = $tag -replace '^refs/tags/', ''
          Write-Host "Tag: $tagName"

          $version = $tagName -replace '^release-v?', ''

          if ($version -match '^\d+\.\d+\.\d+(\.\d+)?$') {
            Write-Host "Version is valid: $version"
            "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "::warning::Invalid version format: $version. Expected format: x.x.x or x.x.x.x"
            "VERSION=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: 拉取 repo 程式碼（含 git-lfs：espeak 二進位與 dll）
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: 安裝 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 以 Native AOT 建置 IpevoEspeakNgProvider，並更新到 payload
        shell: pwsh
        run: |
          # provider P/Invoke 既有的 espeak-ng.dll（已隨 repo 提交於專案內）。
          dotnet publish IpevoEspeakNgProvider/IpevoEspeakNgProvider.csproj -c Release -r win-x64

          $exe = "IpevoEspeakNgProvider/bin/Release/net8.0/win-x64/publish/IpevoEspeakNgProvider.exe"
          if (-not (Test-Path $exe)) { throw "AOT publish output not found: $exe" }
          Copy-Item $exe "espeak-ng/IpevoEspeakNgProvider.exe" -Force
          Write-Host "Updated espeak-ng/IpevoEspeakNgProvider.exe"

      - name: 打包 nupkg（以 tag 版號覆蓋；無版號時用 csproj 版號作建置檢查）
        shell: pwsh
        run: |
          if ($env:VERSION) {
            dotnet pack Ipevo.Windows.EspeakNg.csproj --configuration Release -p:Version="$env:VERSION"
          } else {
            dotnet pack Ipevo.Windows.EspeakNg.csproj --configuration Release
          }

      - name: 推送 nupkg 到 GitHub Packages（跳過已存在的版本）
        if: ${{ env.VERSION != '' }}
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path ./nupkg -Filter *.nupkg
          foreach ($file in $files) {
            Write-Host "Pushing package: $($file.Name) [Size: $("{0:N2} MB" -f ($file.Length / 1MB))]"
            dotnet nuget push $file.FullName --source "https://nuget.pkg.github.com/$env:GITHUB_REPOSITORY_OWNER/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
          }
